name: Build FlClash Linux

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libkeybinder-3.0-dev

      - name: Show environment
        run: |
          flutter --version
          dart --version
          go version

      - name: Get Dart/Flutter packages
        run: flutter pub get

      - name: Precache Linux artifacts
        run: flutter precache --linux

      - name: Build Linux
        run: dart ./setup.dart linux --arch amd64

      - name: Upload Linux artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: flclash-linux-amd64
          path: |
            build/**
            dist/**
            release/**
