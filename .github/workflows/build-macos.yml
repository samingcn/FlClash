name: Build FlClash macOS

on:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Get Dart/Flutter packages
        run: |
          flutter --version
          dart --version
          flutter pub get

      - name: Build macOS
        run: dart ./setup.dart macos --arch arm64

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flclash-macos-arm64
          path: |
            build/**
            dist/**
            release/**
